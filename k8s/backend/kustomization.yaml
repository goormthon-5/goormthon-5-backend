apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: goormthon-5 #FIXME:

resources:
  - backend.yaml
  - ingress.yaml # API 호출 방식이 Client-Side인 경우 주석 해제

configMapGenerator:
  - name: backend-config
    files:
      - config.json=config/backend-config.json
  - name: backend-env
    literals:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=mysql-service
      - DB_PORT=3306
      - DB_NAME=goormthon5
      - DB_USERNAME=sunolum_admin
      - SHOW_SQL=false
      - DDL_AUTO=update
      - AWS_S3_BUCKET=goorm-5-bucket
      - AWS_REGION=ap-northeast-2

generatorOptions:
  disableNameSuffixHash: true
