<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파일 업로드</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }
    button {
      margin-top: 10px;
      padding: 8px 14px;
      cursor: pointer;
    }
    pre {
      margin-top: 16px;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>S3 파일 업로드</h2>
    <p>업로드 대상: <code>http://localhost:8080/api/files</code></p>

    <input id="file" type="file" style="display:none" />
    <button id="attachBtn" type="button">파일 첨부</button>
    <div id="attachedFile" style="margin-top:8px;color:#444;">첨부된 파일 없음</div>
    <button id="uploadBtn">업로드</button>

    <pre id="result">결과가 여기에 표시됩니다.</pre>
  </div>

  <script>
    const attachBtn = document.getElementById("attachBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("file");
    const attachedFile = document.getElementById("attachedFile");
    const result = document.getElementById("result");

    attachBtn.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      attachedFile.textContent = file ? `첨부됨: ${file.name}` : "첨부된 파일 없음";
    });

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) {
        result.textContent = "파일을 선택해 주세요.";
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      try {
        result.textContent = "업로드 중...";
        const response = await fetch("http://localhost:8080/api/files", {
          method: "POST",
          body: formData,
        });

        const text = await response.text();
        if (!response.ok) {
          result.textContent = `업로드 실패 (${response.status})\n${text}`;
          return;
        }

        try {
          result.textContent = JSON.stringify(JSON.parse(text), null, 2);
        } catch {
          result.textContent = text;
        }
      } catch (e) {
        result.textContent = `요청 실패: ${e.message}`;
      }
    });
  </script>
</body>
</html>
